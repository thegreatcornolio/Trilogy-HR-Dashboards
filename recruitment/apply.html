<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — Trilogy BPO</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1e1e1e;--navy2:#2a2a2a;--green:#4AFD0E;--green-dark:#2a8a00;
  --offwhite:#F7F6F2;--border:#e2e1dd;--border2:#c8c7c3;
  --surface:#fff;--surface2:#f2f1ed;--bg:#eceae5;
  --text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;--red:#c0392b;--amber:#f39c12;
}
body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* TOP BAR */
.topbar{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar img{height:26px}
.topbar-txt{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45)}

/* CONTAINER */
.container{max-width:620px;margin:0 auto;padding:0 16px 60px}

/* JOB HERO */
.job-hero{background:var(--navy);color:#fff;margin:0 -16px;padding:36px 24px 40px;position:relative;overflow:hidden}
.job-hero::before{content:'';position:absolute;top:-120px;right:-80px;width:380px;height:380px;background:radial-gradient(circle,rgba(74,253,14,.1) 0%,transparent 70%)}
.job-hero-inner{position:relative;z-index:2}
.job-eyebrow{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.job-eyebrow::before{content:'';width:28px;height:2px;background:var(--green)}
.job-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:14px}
.job-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.job-tag{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif}
.job-tag.salary{background:rgba(74,253,14,.12);border-color:rgba(74,253,14,.3);color:var(--green)}

/* JOB BODY */
.job-section{margin-top:28px}
.job-section h3{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.job-section h3::before{content:'';width:4px;height:16px;background:var(--green);border-radius:2px}
.job-section p{color:var(--text2);font-size:14px}
.job-list{list-style:none}
.job-list li{padding-left:26px;position:relative;margin-bottom:8px;color:var(--text2);font-size:14px}
.job-list li::before{content:'';position:absolute;left:0;top:8px;width:12px;height:12px;background:var(--green);border-radius:3px}

/* FORM CARD */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);margin-top:32px;overflow:hidden}
.form-head{background:var(--navy);padding:20px 24px}
.form-head h2{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;color:#fff}
.form-head p{font-size:13px;color:rgba(255,255,255,.5);margin-top:3px}
.form-body{padding:24px}
.form-group-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin:8px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-group-label:first-child{margin-top:0}
.field{margin-bottom:16px}
.field label{display:block;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.field label .req{color:var(--red)}
.field input,.field select{width:100%;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--radius);font-size:16px;font-family:inherit;color:var(--text);background:var(--offwhite);transition:border .15s,background .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--green-dark);background:#fff}
.field input.error,.field select.error{border-color:var(--red);background:#fdf3f2}
.field-hint{font-size:12px;color:var(--text3);margin-top:4px}
/* FILE UPLOAD */
.upload{border:1.5px dashed var(--border2);border-radius:var(--radius);background:var(--offwhite);padding:16px;text-align:center;cursor:pointer;transition:all .15s}
.upload:hover{border-color:var(--green-dark);background:#fff}
.upload.has-file{border-style:solid;border-color:var(--green-dark);background:#f3fce9}
.upload input[type=file]{display:none}
.upload-icon{font-size:22px;margin-bottom:4px}
.upload-txt{font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;color:var(--text2)}
.upload-sub{font-size:11px;color:var(--text3);margin-top:2px}
.upload.has-file .upload-txt{color:var(--green-dark)}
.field-err{font-size:12px;color:var(--red);margin-top:4px;display:none}
.field-err.show{display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}

/* SEGMENTED */
.seg{display:flex;gap:8px}
.seg-btn{flex:1;padding:12px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--offwhite);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;transition:all .12s}
.seg-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* CONSENT */
.consent{background:var(--offwhite);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:8px}
.consent-row{display:flex;gap:12px;align-items:flex-start}
.consent-row input[type=checkbox]{width:22px;height:22px;margin-top:2px;flex-shrink:0;accent-color:var(--green-dark);cursor:pointer}
.consent-row label{font-size:13px;color:var(--text2);line-height:1.5;cursor:pointer}
.consent-row label strong{color:var(--text)}
.consent-more{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.5}

/* SUBMIT */
.submit-btn{width:100%;padding:16px;background:var(--green);color:#111;border:none;border-radius:var(--radius);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:24px;transition:all .15s}
.submit-btn:hover{background:#5fff1a}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.submit-note{text-align:center;font-size:12px;color:var(--text3);margin-top:12px}

/* STATES */
.loading,.gone{text-align:center;padding:80px 24px;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green-dark);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUCCESS */
.success{text-align:center;padding:50px 24px}
.success-icon{width:80px;height:80px;background:var(--green-light,#edffd6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px}
.success h1{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;margin-bottom:12px}
.success p{color:var(--text2);font-size:15px;max-width:420px;margin:0 auto 8px}
.next-steps{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-top:28px;text-align:left}
.next-steps h3{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px}
.step-item{display:flex;gap:14px;margin-bottom:16px}
.step-item:last-child{margin-bottom:0}
.step-num{width:28px;height:28px;background:var(--navy);color:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;flex-shrink:0}
.step-txt{font-size:14px;color:var(--text2)}
.step-txt strong{color:var(--text)}

/* FOOTER */
.foot{text-align:center;padding:30px 20px;color:var(--text3);font-size:12px}
</style>
</head>
<body>

<div class="topbar">
  <img src="../trilogy-logo.png" alt="Trilogy BPO">
  <div class="topbar-txt">Careers</div>
</div>

<div class="container" id="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading role…</p>
  </div>
</div>

<div class="foot">Trilogy CX (Pty) Ltd · We respect your privacy under POPIA</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG — application flow URLs
// ══════════════════════════════════════════════════════════
var FLOW = {
  getRole:    'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/07f2f98f035c4533a2ada63b8cd7c3cb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kmHspo-5s03LZAbA21KJKA3WtlLZMB4f6LN-S_YeLYo',
  submitApp:  'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/44e1706b012c468aa035836d83ee45db/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=q8OWV5mPQvvR5R4bqm3AzQ6BeGgmv5ZceZpxDbv3tVQ'
};

var role=null;

// Read ?role={slug}
function getSlug(){
  var p=new URLSearchParams(window.location.search);
  return p.get('role')||p.get('r')||'';
}

function parseFlow(txt){
  var data; try{ data=txt?JSON.parse(txt):{}; }catch(e){ console.error('Raw:',txt); return {rows:[]}; }
  var rs=data.ResultSets||data; var table=rs.Table1||(Array.isArray(rs)?rs:null);
  return { rows: table||(Array.isArray(data)?data:[data]) };
}

// ── LOAD ROLE ──
function loadRole(){
  var slug=getSlug();
  if(!slug){ showGone('No role specified','This application link looks incomplete. Please use the link or QR code from the job advert.'); return; }

  if(FLOW.getRole.indexOf('PASTE')!==-1){
    // STUB demo role so the form is testable before flows are wired
    role={RoleID:0,RoleTitle:'Customer Service Agent',CampaignTitle:'OakHouse Foods',Client:'OakHouse Foods',LOB:'Customer Service',
      SalaryMin:8000,SalaryMax:9500,RoleDescription:'Join our team delivering outstanding customer support for a leading UK retail brand.',
      KeyResponsibilities:'Handle inbound customer queries\nResolve issues with empathy and speed\nMeet quality and productivity targets',
      Requirements:'Matric / Grade 12\nClear, confident English\nReliable and target-driven', IsActive:1};
    renderRole(); return;
  }

  fetch(FLOW.getRole,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({URLSlug:slug})})
  .then(function(r){return r.text();})
  .then(function(txt){
    var rows=parseFlow(txt).rows||[];
    if(!rows.length || !rows[0].RoleID){ showGone('Role not found','This role may have closed or the link is incorrect. Please check the advert for an up-to-date link.'); return; }
    role=rows[0]; renderRole();
  })
  .catch(function(){ showGone('Something went wrong','We couldn\'t load this role right now. Please try again shortly.'); });
}

function showGone(title,msg){
  document.getElementById('container').innerHTML='<div class="gone"><h1 style="font-family:Montserrat;font-size:22px;margin-bottom:10px;color:var(--text)">'+esc(title)+'</h1><p>'+esc(msg)+'</p></div>';
}

// ── RENDER ROLE + FORM ──
function renderRole(){
  var salary='';
  if(role.SalaryMin||role.SalaryMax){
    var mn=role.SalaryMin?'R'+Number(role.SalaryMin).toLocaleString('en-ZA'):'';
    var mx=(role.SalaryMax&&role.SalaryMax!==role.SalaryMin)?' – R'+Number(role.SalaryMax).toLocaleString('en-ZA'):'';
    salary=mn+mx+' / month';
  }
  var resp=(role.KeyResponsibilities||'').split(/\n|;/).map(function(s){return s.trim();}).filter(Boolean);
  var reqs=(role.Requirements||'').split(/\n|;/).map(function(s){return s.trim();}).filter(Boolean);

  var html=''+
  '<div class="job-hero"><div class="job-hero-inner">'+
    '<div class="job-eyebrow">We\'re hiring</div>'+
    '<div class="job-title">'+esc(role.RoleTitle||'Role')+'</div>'+
    '<div class="job-meta">'+
      (role.Client||role.CampaignTitle?'<span class="job-tag">'+esc(role.Client||role.CampaignTitle)+'</span>':'')+
      (role.LOB?'<span class="job-tag">'+esc(role.LOB)+'</span>':'')+
      (salary?'<span class="job-tag salary">'+esc(salary)+'</span>':'')+
    '</div>'+
  '</div></div>';

  if(role.RoleDescription) html+='<div class="job-section"><h3>About the role</h3><p>'+esc(role.RoleDescription)+'</p></div>';
  if(resp.length) html+='<div class="job-section"><h3>What you\'ll do</h3><ul class="job-list">'+resp.map(function(r){return '<li>'+esc(r)+'</li>';}).join('')+'</ul></div>';
  if(reqs.length) html+='<div class="job-section"><h3>What we\'re looking for</h3><ul class="job-list">'+reqs.map(function(r){return '<li>'+esc(r)+'</li>';}).join('')+'</ul></div>';

  // FORM
  html+=''+
  '<div class="form-card">'+
    '<div class="form-head"><h2>Apply now</h2><p>Takes about 5 minutes · have your ID and CV ready</p></div>'+
    '<div class="form-body">'+

      '<div class="form-group-label">Your details</div>'+
      '<div class="field"><label>Title <span class="req">*</span></label><select id="fTitle"><option value="">Select…</option><option>Mr</option><option>Mrs</option><option>Ms</option><option>Miss</option><option>Dr</option><option>Prof</option><option>Adv</option></select><div class="field-err" id="eTitle">Required</div></div>'+
      '<div class="row2">'+
        '<div class="field"><label>First name (as per ID) <span class="req">*</span></label><input id="fFirst" type="text" autocomplete="given-name"><div class="field-err" id="eFirst">Required</div></div>'+
        '<div class="field"><label>Surname (as per ID) <span class="req">*</span></label><input id="fLast" type="text" autocomplete="family-name"><div class="field-err" id="eLast">Required</div></div>'+
      '</div>'+

      '<div class="field"><label>ID type <span class="req">*</span></label>'+
        '<div class="seg"><button type="button" class="seg-btn active" id="segSAID" onclick="setIDType(\'SA_ID\')">SA ID</button><button type="button" class="seg-btn" id="segPass" onclick="setIDType(\'Passport\')">Passport</button></div></div>'+
      '<div class="field"><label id="lblID">SA ID number <span class="req">*</span></label><input id="fID" type="text" inputmode="numeric" maxlength="13" oninput="onIDInput()"><div class="field-err" id="eID">Enter a valid 13-digit SA ID number</div></div>'+
      '<div class="field" id="countryWrap" style="display:none"><label>Nationality <span class="req">*</span></label><select id="fCountry"><option value="">Select…</option><option>Zimbabwean</option><option>Nigerian</option><option>Congolese (DRC)</option><option>Malawian</option><option>Mozambican</option><option>Zambian</option><option>Kenyan</option><option>Ghanaian</option><option>Cameroonian</option><option>Somali</option><option>Ethiopian</option><option>Indian</option><option>Pakistani</option><option>Bangladeshi</option><option>Other</option></select><div class="field-err" id="eCountry">Please select your nationality</div></div>'+

      '<div class="row2">'+
        '<div class="field"><label>Date of birth <span class="req">*</span></label><input id="fDOB" type="date"><div class="field-hint">Auto-filled from your ID</div><div class="field-err" id="eDOB">Required</div></div>'+
        '<div class="field"><label>Gender <span class="req">*</span></label><select id="fGender"><option value="">Select…</option><option>Male</option><option>Female</option><option>Non-binary</option><option>Prefer not to say</option></select><div class="field-err" id="eGender">Required</div></div>'+
      '</div>'+

      '<div class="form-group-label">Contact</div>'+
      '<div class="field"><label>Cell number <span class="req">*</span></label><input id="fMobile" type="tel" inputmode="tel" autocomplete="tel" placeholder="0__ ___ ____"><div class="field-err" id="eMobile">Required</div></div>'+
      '<div class="field"><label>Personal email <span class="req">*</span></label><input id="fEmail" type="email" inputmode="email" autocomplete="email"><div class="field-err" id="eEmail">Enter a valid email</div></div>'+

      '<div class="form-group-label">Experience &amp; background</div>'+
      '<div class="field"><label>Months of experience <span class="req">*</span></label><select id="fExp"><option value="">Select…</option><option value="0-6">0 – 6 months</option><option value="6-12">6 – 12 months</option><option value="12-18">12 – 18 months</option><option value="18+">18+ months</option></select><div class="field-err" id="eExp">Required</div></div>'+
      '<div class="field"><label>Highest qualification <span class="req">*</span></label><select id="fQual"><option value="">Select…</option><option>Below Matric</option><option>Matric / Grade 12</option><option>Certificate</option><option>Diploma</option><option>Degree</option><option>Postgraduate</option></select><div class="field-err" id="eQual">Required</div></div>'+
      '<div class="field"><label>Are you currently employed?</label>'+
        '<div class="seg"><button type="button" class="seg-btn" id="segEmpY" onclick="setEmployed(true)">Yes</button><button type="button" class="seg-btn" id="segEmpN" onclick="setEmployed(false)">No</button></div></div>'+
      '<div class="field" id="noticeWrap" style="display:none"><label>Notice period</label><select id="fNotice"><option value="">Select…</option><option>Immediately available</option><option>1 week</option><option>2 weeks</option><option>1 month</option><option>More than 1 month</option></select></div>'+

      '<div class="form-group-label">Documents</div>'+
      '<div class="field"><label>Upload your ID document <span class="req">*</span></label>'+
        '<label class="upload" id="upID" for="fileID"><div class="upload-icon">🪪</div><div class="upload-txt" id="upIDtxt">Tap to upload your ID</div><div class="upload-sub">PDF, JPG or PNG · max 8MB</div>'+
        '<input type="file" id="fileID" accept=".pdf,.jpg,.jpeg,.png" onchange="onFile(\'ID\')"></label>'+
        '<div class="field-err" id="eFileID">Please upload your ID</div></div>'+
      '<div class="field"><label>Upload your CV <span class="req">*</span></label>'+
        '<label class="upload" id="upCV" for="fileCV"><div class="upload-icon">📄</div><div class="upload-txt" id="upCVtxt">Tap to upload your CV</div><div class="upload-sub">PDF, DOC or DOCX · max 8MB</div>'+
        '<input type="file" id="fileCV" accept=".pdf,.doc,.docx" onchange="onFile(\'CV\')"></label>'+
        '<div class="field-err" id="eFileCV">Please upload your CV</div></div>'+

      '<div class="form-group-label">Consent</div>'+
      '<div class="consent">'+
        '<div class="consent-row">'+
          '<input type="checkbox" id="fConsent">'+
          '<label for="fConsent"><strong>I consent to Trilogy BPO processing my personal information</strong> for recruitment purposes, in line with POPIA. I understand my information and documents will be used to assess my application and contact me about this and similar roles.</label>'+
        '</div>'+
        '<div class="consent-more">You can withdraw consent at any time by contacting us. We keep your data secure and only share it as needed for your application.</div>'+
      '</div>'+
      '<div class="field-err" id="eConsent" style="margin-top:8px">Please tick the consent box to continue</div>'+

      '<button class="submit-btn" id="submitBtn" onclick="submitApp()">Submit application</button>'+
      '<div class="submit-note">We\'ll send next steps to your email and WhatsApp.</div>'+

    '</div>'+
  '</div>';

  document.getElementById('container').innerHTML=html;
}

// ── FORM STATE ──
var employed=null;
var idType='SA_ID';
var files={ ID:null, CV:null };   // holds {name, type, base64} per doc
var MAX_BYTES=8*1024*1024;        // 8MB

function setIDType(t){
  idType=t;
  var isSA=(t==='SA_ID');
  document.getElementById('segSAID').classList.toggle('active',isSA);
  document.getElementById('segPass').classList.toggle('active',!isSA);
  document.getElementById('lblID').innerHTML=(isSA?'SA ID number':'Passport number')+' <span class="req">*</span>';
  var idInput=document.getElementById('fID');
  if(isSA){ idInput.setAttribute('inputmode','numeric'); idInput.setAttribute('maxlength','13'); }
  else { idInput.setAttribute('inputmode','text'); idInput.removeAttribute('maxlength'); }
  document.getElementById('eID').textContent=isSA?'Enter a valid 13-digit SA ID number':'Enter your passport number';
  document.getElementById('countryWrap').style.display=isSA?'none':'block';
}

function setEmployed(v){
  employed=v;
  document.getElementById('segEmpY').classList.toggle('active',v===true);
  document.getElementById('segEmpN').classList.toggle('active',v===false);
  document.getElementById('noticeWrap').style.display=v===true?'block':'none';
}

// ── FILE HANDLING (read → base64) ──
function onFile(which){
  var input=document.getElementById('file'+which);
  var f=input.files&&input.files[0];
  if(!f){ files[which]=null; resetUpload(which); return; }
  if(f.size>MAX_BYTES){
    alert('That file is too large ('+(f.size/1048576).toFixed(1)+'MB). Please upload a file under 8MB.');
    input.value=''; files[which]=null; resetUpload(which); return;
  }
  var reader=new FileReader();
  reader.onload=function(){
    // strip the "data:...;base64," prefix — the flow just needs the raw base64
    var b64=String(reader.result).split(',')[1]||'';
    files[which]={ name:f.name, type:f.type||'application/octet-stream', base64:b64 };
    var box=document.getElementById('up'+which);
    box.classList.add('has-file');
    document.getElementById('up'+which+'txt').textContent='✓ '+f.name;
    var err=document.getElementById('eFile'+which); if(err) err.classList.remove('show');
  };
  reader.onerror=function(){ alert('Could not read that file. Please try another.'); input.value=''; files[which]=null; resetUpload(which); };
  reader.readAsDataURL(f);
}
function resetUpload(which){
  var box=document.getElementById('up'+which);
  if(box) box.classList.remove('has-file');
  var txt=document.getElementById('up'+which+'txt');
  if(txt) txt.textContent=which==='ID'?'Tap to upload your ID':'Tap to upload your CV';
}

// Auto-fill DOB + gender from SA ID
function onIDInput(){
  if(idType!=='SA_ID') return;
  var v=document.getElementById('fID').value.replace(/\D/g,'');
  if(v.length>=6){
    var yy=parseInt(v.substring(0,2),10), mm=v.substring(2,4), dd=v.substring(4,6);
    var nowYY=new Date().getFullYear()%100;
    var year=(yy<=nowYY?2000:1900)+yy;
    if(mm>='01'&&mm<='12'&&dd>='01'&&dd<='31'){
      document.getElementById('fDOB').value=year+'-'+mm+'-'+dd;
    }
  }
  if(v.length>=10){
    var g=parseInt(v.substring(6,10),10);
    document.getElementById('fGender').value=(g<5000?'Female':'Male');
  }
}

// ── SUBMIT ──
function submitApp(){
  // clear errors
  ['Title','First','Last','ID','Country','DOB','Gender','Mobile','Email','Exp','Qual','Consent','FileID','FileCV'].forEach(function(k){
    var e=document.getElementById('e'+k); if(e) e.classList.remove('show');
    var f=document.getElementById('f'+k); if(f) f.classList.remove('error');
  });

  var isSA=(idType==='SA_ID');
  var title=val('fTitle'), first=val('fFirst'), last=val('fLast');
  var idRaw=val('fID');
  var idClean=isSA?idRaw.replace(/\D/g,''):idRaw.trim();
  var country=val('fCountry');
  var dob=val('fDOB'), gender=val('fGender'), mobile=val('fMobile'), email=val('fEmail'),
      exp=val('fExp'), qual=val('fQual'),
      consent=document.getElementById('fConsent').checked;

  var ok=true;
  if(!title){ fail('Title','eTitle'); ok=false; }
  if(!first){ fail('First','eFirst'); ok=false; }
  if(!last){ fail('Last','eLast'); ok=false; }
  if(isSA){ if(idClean.length!==13){ fail('ID','eID'); ok=false; } }
  else { if(!idClean){ fail('ID','eID'); ok=false; } if(!country){ fail('Country','eCountry'); ok=false; } }
  if(!dob){ fail('DOB','eDOB'); ok=false; }
  if(!gender){ fail('Gender','eGender'); ok=false; }
  if(!mobile){ fail('Mobile','eMobile'); ok=false; }
  if(!email||email.indexOf('@')<1){ fail('Email','eEmail'); ok=false; }
  if(!exp){ fail('Exp','eExp'); ok=false; }
  if(!qual){ fail('Qual','eQual'); ok=false; }
  if(!files.ID){ document.getElementById('eFileID').classList.add('show'); ok=false; }
  if(!files.CV){ document.getElementById('eFileCV').classList.add('show'); ok=false; }
  if(!consent){ document.getElementById('eConsent').classList.add('show'); ok=false; }
  if(!ok){ var firstErr=document.querySelector('.error,.field-err.show'); if(firstErr) window.scrollTo({top:firstErr.offsetTop-120,behavior:'smooth'}); return; }

  var payload={
    RoleID: role.RoleID,
    Title:title, FirstName:first, LastName:last,
    IDType: isSA?'SA_ID':'Passport',
    IDNumber: isSA?idClean:'',
    PassportNumber: isSA?'':idClean,
    Nationality: isSA?'South African':country,
    DateOfBirth:dob, Gender:gender,
    Mobile:mobile, PersonalEmail:email,
    MonthsExperience:exp, HighestQualification:qual,
    CurrentlyEmployed: employed===null?null:(employed?true:false),
    NoticePeriod:val('fNotice'),
    // documents — raw base64 + filename + mime, for the SharePoint upload flow
    IDFileName: files.ID.name, IDFileType: files.ID.type, IDFileBase64: files.ID.base64,
    CVFileName: files.CV.name, CVFileType: files.CV.type, CVFileBase64: files.CV.base64,
    POPIAConsentIP:null
  };

  var btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='Uploading…';

  if(FLOW.submitApp.indexOf('PASTE')!==-1){
    setTimeout(function(){ showSuccess(first); },900); return;
  }

  fetch(FLOW.submitApp,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){return r.text();})
  .then(function(txt){
    var row=parseFlow(txt).rows[0]||{};
    if(row.Result==='Success' || row.Result==='Duplicate'){ showSuccess(first, row.Result==='Duplicate'); }
    else { throw new Error(row.Message||'Submission failed'); }
  })
  .catch(function(err){ btn.disabled=false; btn.textContent='Submit application'; alert('Sorry, something went wrong: '+err.message+'\nPlease try again.'); });
}

function showSuccess(name, dup){
  var html='<div class="success">'+
    '<div class="success-icon">✓</div>'+
    '<h1>'+(dup?'You\'ve already applied':'Application received!')+'</h1>'+
    '<p>'+(dup?'We already have your application for this role, '+esc(name)+'. We\'ll be in touch.':'Thanks, '+esc(name)+'. Your application for <strong>'+esc(role.RoleTitle||'this role')+'</strong> is in.')+'</p>'+
    '<div class="next-steps"><h3>What happens next</h3>'+
      '<div class="step-item"><div class="step-num">1</div><div class="step-txt"><strong>Assessment</strong> — you\'ll get a link by email and WhatsApp to complete a short online assessment.</div></div>'+
      '<div class="step-item"><div class="step-num">2</div><div class="step-txt"><strong>Review</strong> — our recruitment team reviews your application and assessment.</div></div>'+
      '<div class="step-item"><div class="step-num">3</div><div class="step-txt"><strong>Interview</strong> — if shortlisted, we\'ll invite you to book an interview slot.</div></div>'+
    '</div>'+
    '<p style="margin-top:24px;font-size:13px;color:var(--text3)">Keep an eye on your email and WhatsApp.</p>'+
  '</div>';
  document.getElementById('container').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── HELPERS ──
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function fail(fk,ek){var f=document.getElementById('f'+fk),e=document.getElementById(ek);if(f)f.classList.add('error');if(e)e.classList.add('show');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadRole();
</script>
