<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1e1e1e;--navy2:#2a2a2a;--green:#4AFD0E;--green-light:#edffd6;--green-dark:#2a8a00;--offwhite:#F7F6F2;--border:#e2e1dd;--border2:#c8c7c3;--surface:#fff;--surface2:#f2f1ed;--bg:#e8e7e3;--text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;--radius:8px;--radius-lg:12px;--radius-xl:16px;--red:#c0392b;--amber:#b9770e;--blue:#1f6feb}
html{scroll-behavior:smooth;overflow-x:hidden}
body{overflow-x:hidden;font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

.nav{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 24px rgba(0,0,0,.35)}
.nav-logo{height:28px}
.nav-divider{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 1rem}
.nav-section{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.nav-back{font-size:11px;color:rgba(255,255,255,.4);text-decoration:none;font-family:'Montserrat',sans-serif}
.nav-back:hover{color:var(--green)}
.nav-links{display:flex;align-items:center;gap:1.25rem}

.hero{background:var(--navy);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.05)}
.hero::before{content:'';position:absolute;top:-80px;right:-40px;width:340px;height:340px;background:radial-gradient(circle,rgba(74,253,14,.06) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.hero-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:.5rem;opacity:.8}
.hero-title{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:-.02em;margin-bottom:.4rem}
.hero-sub{font-size:13px;color:rgba(255,255,255,.4);max-width:680px}

.tabbar{background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:64px;z-index:190}
.tabbar-inner{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;gap:.25rem;overflow-x:auto}
.tab-btn{background:none;border:none;color:rgba(255,255,255,.5);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:.02em;padding:14px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:rgba(255,255,255,.8)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

.shell{max-width:1200px;margin:0 auto;padding:2rem 2rem 5rem}
.tab-panel{display:none}
.tab-panel.active{display:block}

.bar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
.bar-left{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.field-label{font-size:11px;color:var(--text3);font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.select,select{padding:9px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-family:'Wix Madefor Text',sans-serif;font-size:13px;color:var(--text);background:var(--surface);min-width:220px}
.btn{padding:10px 18px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover:not(:disabled){background:var(--green);color:#111}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;box-shadow:0 1px 8px rgba(27,42,74,.08)}
.card-label{font-size:11px;color:var(--text3);font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.4rem}
.card-num{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:900;color:var(--text);line-height:1.1}
.card-sub{font-size:12px;color:var(--text3);margin-top:.3rem}

.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface);box-shadow:0 1px 8px rgba(27,42,74,.08)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
th{background:var(--navy);color:rgba(255,255,255,.7);padding:11px 14px;text-align:left;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0}
th.num,td.num{text-align:right}
td{padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f7f6f2}
tr.expand-row td{background:#fafaf8;white-space:normal;cursor:default}
.emp-name{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--text)}
.money{font-variant-numeric:tabular-nums}
.row-toggle{cursor:pointer}
.row-toggle:hover td{background:#f0f6ff}
.chev{display:inline-block;transition:transform .15s;font-size:10px;color:var(--text3);margin-right:6px}
.chev.open{transform:rotate(90deg)}

.panel{border-radius:var(--radius);padding:1rem 1.25rem;font-size:13px;margin-bottom:1.5rem}
.panel-info{background:#eef2f7;border:1px solid var(--border2);color:var(--text2)}
.panel-warn{background:#fcefe9;border:1px solid var(--red);color:var(--red)}
.panel-title{font-family:'Montserrat',sans-serif;font-weight:800;margin-bottom:.25rem}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle}
.spinner-dark{border-color:#c8c7c3;border-top-color:#1B2A4A}
@keyframes spin{to{transform:rotate(360deg)}}
.center{text-align:center;padding:3rem 1rem;color:var(--text3)}
.foot-note{font-size:12px;color:var(--text3);margin-top:1.5rem;text-align:center;line-height:1.7}
.hidden{display:none}

/* Payslip document */
:root{--ps-navy:#0c1926;--ps-lime:#caea70;--ps-mint:#71e56e;--ps-offwhite:#f5f7f9}
.payslip-overlay{position:fixed;inset:0;background:rgba(12,25,38,.6);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem;overflow-y:auto}
.payslip-overlay.hidden{display:none}
.payslip-doc{background:var(--ps-offwhite);width:100%;max-width:640px;border-radius:16px;box-shadow:0 24px 70px rgba(12,25,38,.4);overflow:hidden}
.payslip-head{background:var(--ps-navy);padding:1.5rem 1.75rem;display:flex;align-items:center;justify-content:space-between}
.payslip-head img{height:24px}
.payslip-head .ps-tag{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ps-navy);background:var(--ps-lime);padding:5px 12px;border-radius:20px}
.payslip-body{padding:1.75rem;max-height:60vh;overflow-y:auto}
.ps-emp-row{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem}
.ps-avatar{width:46px;height:46px;border-radius:50%;background:var(--ps-navy);color:var(--ps-lime);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;flex-shrink:0}
.ps-emp-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:17px;color:var(--ps-navy);line-height:1.2}
.ps-emp-period{font-size:12px;color:#5b6b7a;margin-top:1px}
.ps-row{display:none}
.ps-block-label{font-size:10px;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8b98a3}
.ps-block-value{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:var(--ps-navy)}
.ps-section{background:#fff;border:1px solid #e6e9ec;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.9rem}
.ps-section-title{display:flex;align-items:center;gap:8px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ps-navy);margin-bottom:.6rem}
.ps-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.ps-dot.income{background:var(--ps-mint)}
.ps-dot.deduction{background:var(--ps-navy)}
.ps-dot.employer{background:var(--ps-lime)}
.ps-line{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#3d4a56}
.ps-line.total{font-family:'Montserrat',sans-serif;font-weight:800;color:var(--ps-navy);border-top:1px solid #edf0f2;margin-top:6px;padding-top:9px}
.ps-nett{background:linear-gradient(120deg,var(--ps-lime),var(--ps-mint));border-radius:12px;padding:1.1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;margin-top:.25rem}
.ps-nett .lbl{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ps-navy)}
.ps-nett .val{font-family:'Montserrat',sans-serif;font-weight:900;font-size:23px;color:var(--ps-navy)}
.ps-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.ps-close:hover{color:var(--ps-lime)}
.ps-actions{padding:1.1rem 1.75rem;background:var(--ps-offwhite);border-top:1px solid #e6e9ec;display:flex;justify-content:flex-end;gap:.6rem}
.ps-actions .btn-outline{background:#fff}
.ps-actions .btn:not(.btn-outline){background:var(--ps-navy);color:var(--ps-lime)}
.ps-actions .btn:not(.btn-outline):hover{background:#152634;color:var(--ps-lime)}

@media print {
  body * { visibility:hidden; }
  .payslip-doc, .payslip-doc * { visibility:visible; }
  .payslip-overlay{position:absolute;background:none;padding:0}
  .ps-actions{display:none}
}
</style>

<script>/* HR Portal auth gate — reads the same MSAL session the portal sets */
(function () {
  var KEY = 'hrportal_session';
  var MODULE = 'payroll';
  var raw = sessionStorage.getItem(KEY);
  if (!raw) { window.location.replace('../index.html'); return; }
  try {
    var s = JSON.parse(raw);
    var isAdmin = (s.role || '').toLowerCase() === 'admin';
    var mods = Array.isArray(s.modules) ? s.modules.map(function (m) { return String(m).toLowerCase(); }) : [];
    if (!isAdmin && mods.indexOf(MODULE) < 0) {
      window.location.replace('../index.html');
    }
  } catch (e) {
    sessionStorage.removeItem(KEY);
    window.location.replace('../index.html');
  }
})();
</script>

<script>
/* ── Flow endpoints ── */
const LIST_PAY_RUNS_URL = "https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/10/workflows/9301b1d4ee4d4b18b0a0def3731cd198/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=OS-NMeruGzyNoDXBk3jAC98bPju8WR1r-4zHMmMLdPg";
const PAY_RUN_DETAIL_URL = "https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/29/workflows/1b31ef7939bf4a6cab4cfcda385ecfb4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=vRHIaDnq-uh_aX_s92pNRV5dGWjdC4EcT9X3sfV0llY";
const EMPLOYEE_PAYSLIPS_URL = "https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/31/workflows/6f4b15859aec48f89c3c3677edbaf3d9/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4MxNW-Dm6OUNaQ_ISQzDEe2B62RFb18p0SENS5YrnPA";
const MONTHLY_REPORT_URL = "https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/31/workflows/2588a7f7047443959b39159b41d3a280/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ds7_441izZ9mvSfukvgIwT3qxCfBOq0kx5dX5uZIqNU";
const SARS_LIABILITY_URL = "https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/19/workflows/fc8ee56a73104307a727ebeb7a83ec8d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=et_XjGzN6oyWNThneJKRf5NH_8YcEn2AqLOZ_9CpSe4";

const zar0 = new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR', minimumFractionDigits: 0, maximumFractionDigits: 0 });
const zar2 = new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR', minimumFractionDigits: 2, maximumFractionDigits: 2 });
const money = v => (v === null || v === undefined || isNaN(v)) ? '—' : zar0.format(v);
const money2 = v => (v === null || v === undefined || isNaN(v)) ? '—' : zar2.format(v);

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return String(s).slice(0, 10);
  return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
}
function isoDate(s) {
  if (!s) return '';
  return String(s).slice(0, 10);
}
// SimplePay payslip line items arrive as [["Label","123.45"], ...] — pull out a line by (case-insensitive) label
function lineFind(arr, label) {
  if (!Array.isArray(arr)) return null;
  const hit = arr.find(pair => Array.isArray(pair) && String(pair[0]).toLowerCase() === label.toLowerCase());
  return hit ? Number(hit[1]) : null;
}
function parseJsonField(v) {
  if (v == null) return [];
  if (Array.isArray(v)) return v;
  try { return JSON.parse(v); } catch (e) { return []; }
}

/* ── Tab switching ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── Shared: load pay run list into any <select> ── */
let payRunsCache = null;
async function fetchPayRuns() {
  if (payRunsCache) return payRunsCache;
  const res = await fetch(LIST_PAY_RUNS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  if (!res.ok) throw new Error('Could not load pay runs (status ' + res.status + ').');
  const data = await res.json();
  const runs = (Array.isArray(data) ? data : []).map(r => r.payment_run).filter(Boolean);
  runs.sort((a, b) => new Date(b.period_end_date) - new Date(a.period_end_date));
  payRunsCache = runs;
  return runs;
}
function populatePayRunSelect(selectEl, runs) {
  selectEl.innerHTML = runs.map(r =>
    '<option value="' + r.id + '" data-date="' + isoDate(r.period_end_date) + '">' +
    fmtDate(r.period_end_date) + ' · ' + money(r.total) +
    (r.posted_to_accounting_system ? '' : ' (not yet posted)') +
    '</option>'
  ).join('');
}

/* ═══════════════════════ PAY RUNS TAB ═══════════════════════ */
async function initPayRunsTab() {
  const sel = document.getElementById('pr-select');
  const content = document.getElementById('pr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Loading pay runs…</div>';
  try {
    const runs = await fetchPayRuns();
    populatePayRunSelect(sel, runs);
    content.innerHTML = '<div class="panel panel-info">Pick a pay run above, then click <b>View pay run</b>.</div>';
    if (runs.length) loadPayRunDetail();
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load pay runs</div>' + escapeHtml(err.message) + '</div>';
  }
}

async function loadPayRunDetail() {
  const sel = document.getElementById('pr-select');
  const id = sel.value;
  if (!id) return;
  const content = document.getElementById('pr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Loading payslips for this pay run…</div>';
  try {
    const res = await fetch(PAY_RUN_DETAIL_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ payment_run_id: Number(id) }) });
    if (!res.ok) throw new Error('Status ' + res.status);
    const rows = await res.json();
    renderPayRunDetail(rows || []);
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load this pay run</div>' + escapeHtml(err.message) + '</div>';
  }
}

function renderPayRunDetail(rows) {
  const content = document.getElementById('pr-content');
  if (!rows.length) {
    content.innerHTML = '<div class="panel panel-info">No payslips found for this pay run.</div>';
    return;
  }
  let totalNett = 0, totalGross = 0;
  const parsed = rows.map(r => {
    const income = parseJsonField(r.IncomeJSON);
    const deduction = parseJsonField(r.DeductionJSON);
    const sideline = parseJsonField(r.SidelineJSON);
    const gross = lineFind(income, 'Total');
    const ded = lineFind(deduction, 'Total');
    totalNett += Number(r.NettPay) || 0;
    totalGross += gross || 0;
    return { r, income, deduction, sideline, gross, ded };
  });

  const cards = [
    { label: 'Employees paid', num: rows.length },
    { label: 'Total gross', num: money(totalGross) },
    { label: 'Total nett paid', num: money(totalNett) }
  ];

  let html = '<div class="cards">' + cards.map(c =>
    '<div class="card"><div class="card-label">' + c.label + '</div><div class="card-num">' + c.num + '</div></div>'
  ).join('') + '</div>';

  html += '<div class="tbl-wrap"><table><thead><tr><th></th><th>Employee</th><th class="num">Gross</th><th class="num">Deductions</th><th class="num">Nett pay</th><th></th></tr></thead><tbody>';
  parsed.forEach((p, i) => {
    html += '<tr class="row-toggle" onclick="toggleExpand(' + i + ')">' +
      '<td><span class="chev" id="chev-' + i + '">▸</span></td>' +
      '<td class="emp-name">' + escapeHtml(p.r.FirstName) + ' ' + escapeHtml(p.r.LastName) + '</td>' +
      '<td class="num money">' + money2(p.gross) + '</td>' +
      '<td class="num money">' + money2(p.ded) + '</td>' +
      '<td class="num money">' + money2(p.r.NettPay) + '</td>' +
      '<td><button class="btn btn-outline" style="padding:6px 12px;font-size:11px" onclick="event.stopPropagation();showPayslipDoc(' + i + ')">View payslip</button></td>' +
      '</tr>' +
      '<tr class="expand-row hidden" id="expand-' + i + '"><td colspan="6">' + renderBreakdownInline(p) + '</td></tr>';
  });
  html += '</tbody></table></div>';

  content.innerHTML = html;
  window._prRows = parsed; // stash for expand/payslip modal
}

function renderBreakdownInline(p) {
  const fmt = arr => arr.filter(x => x[0].toLowerCase() !== 'total').map(x => '<div class="ps-line"><span>' + escapeHtml(x[0]) + '</span><span class="money">' + money2(Number(x[1])) + '</span></div>').join('');
  let out = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;padding:.5rem 0">';
  out += '<div><div class="ps-section-title">Income</div>' + fmt(p.income) + '</div>';
  out += '<div><div class="ps-section-title">Deductions</div>' + fmt(p.deduction) + '</div>';
  out += '</div>';
  return out;
}

function toggleExpand(i) {
  const row = document.getElementById('expand-' + i);
  const chev = document.getElementById('chev-' + i);
  row.classList.toggle('hidden');
  chev.classList.toggle('open');
}

/* ═══════════════════════ PAYSLIPS TAB (branded template + employee history) ═══════════════════════ */
async function initPayslipsTab() {
  const sel = document.getElementById('ps-emp-select');
  const content = document.getElementById('ps-content');
  content.innerHTML = '';
  sel.innerHTML = '<option>Loading employees…</option>';
  try {
    const runs = await fetchPayRuns();
    if (!runs.length) { sel.innerHTML = '<option>No pay runs found</option>'; return; }
    const latest = runs[0]; // most recent period_end_date
    const res = await fetch(MONTHLY_REPORT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ payment_run_id: latest.id }) });
    if (!res.ok) throw new Error('Status ' + res.status);
    const rows = await res.json();
    const list = (rows || []).slice().sort((a, b) => (a.LastName || '').localeCompare(b.LastName || ''));
    sel.innerHTML = list.map(r => '<option value="' + escapeHtml(r.IDNumber) + '">' + escapeHtml(r.LastName) + ', ' + escapeHtml(r.FirstName) + '</option>').join('');
    content.innerHTML = '<div class="panel panel-info">Pick an employee above, then click <b>View payslips</b> to see their payslip history.</div>';
  } catch (err) {
    sel.innerHTML = '<option>Error loading list</option>';
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load employee list</div>' + escapeHtml(err.message) + '</div>';
  }
}

async function loadEmployeePayslips() {
  const sel = document.getElementById('ps-emp-select');
  const idNumber = sel.value;
  if (!idNumber) return;
  const content = document.getElementById('ps-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Loading payslip history…</div>';
  try {
    const res = await fetch(EMPLOYEE_PAYSLIPS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id_number: idNumber }) });
    if (!res.ok) throw new Error('Status ' + res.status);
    const rows = await res.json();
    renderEmployeePayslipHistory(rows || []);
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load payslip history</div>' + escapeHtml(err.message) + '</div>';
  }
}

function renderEmployeePayslipHistory(rows) {
  const content = document.getElementById('ps-content');
  if (!rows.length) {
    content.innerHTML = '<div class="panel panel-info">No payslip history found for this employee yet.</div>';
    return;
  }
  const parsed = rows.map(r => ({
    r,
    income: parseJsonField(r.IncomeJSON),
    deduction: parseJsonField(r.DeductionJSON),
    sideline: parseJsonField(r.SidelineJSON)
  }));
  let html = '<div class="tbl-wrap"><table><thead><tr><th>Pay period</th><th class="num">Nett pay</th><th></th></tr></thead><tbody>';
  parsed.forEach((p, i) => {
    html += '<tr><td class="emp-name">' + fmtDate(p.r.PeriodEndDate) + '</td>' +
      '<td class="num money">' + money2(p.r.NettPay) + '</td>' +
      '<td><button class="btn" style="padding:6px 12px;font-size:11px" onclick="showEmployeePayslipDoc(' + i + ')">View payslip</button></td></tr>';
  });
  html += '</tbody></table></div>';
  content.innerHTML = html;
  window._psRows = parsed;
  window._psEmpName = document.getElementById('ps-emp-select').selectedOptions[0].textContent;
}

/* ── Branded payslip document rendering (shared) ── */
function initials(name) { return (name || '??').split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase(); }

function buildPayslipDocHtml(name, periodLabel, income, deduction, sideline, nettPay) {
  const fmtLines = arr => (arr || []).filter(x => x[0].toLowerCase() !== 'total')
    .map(x => '<div class="ps-line"><span>' + escapeHtml(x[0]) + '</span><span class="money">' + money2(Number(x[1])) + '</span></div>').join('');
  const totalOf = arr => lineFind(arr, 'Total');

  let employerContribHtml = '';
  (sideline || []).forEach(block => {
    if (!Array.isArray(block) || block[0].toLowerCase() !== 'employer contribution') return;
    employerContribHtml = '<div class="ps-section"><div class="ps-section-title"><span class="ps-dot employer"></span>Employer Contributions</div>' + fmtLines(block[1]) +
      '<div class="ps-line total"><span>Total</span><span class="money">' + money2(totalOf(block[1])) + '</span></div></div>';
  });

  return '' +
    '<div class="ps-emp-row"><div class="ps-avatar">' + initials(name) + '</div>' +
    '<div><div class="ps-emp-name">' + escapeHtml(name) + '</div><div class="ps-emp-period">Pay period · ' + escapeHtml(periodLabel) + '</div></div></div>' +
    '<div class="ps-section"><div class="ps-section-title"><span class="ps-dot income"></span>Income</div>' + fmtLines(income) +
      '<div class="ps-line total"><span>Total</span><span class="money">' + money2(totalOf(income)) + '</span></div></div>' +
    '<div class="ps-section"><div class="ps-section-title"><span class="ps-dot deduction"></span>Deductions</div>' + fmtLines(deduction) +
      '<div class="ps-line total"><span>Total</span><span class="money">' + money2(totalOf(deduction)) + '</span></div></div>' +
    employerContribHtml +
    '<div class="ps-nett"><span class="lbl">Nett Pay</span><span class="val">' + money2(nettPay) + '</span></div>';
}

function showPayslipDoc(i) {
  const p = window._prRows[i];
  const sel = document.getElementById('pr-select');
  const periodLabel = fmtDate(sel.selectedOptions[0].dataset.date);
  document.getElementById('ps-doc-body').innerHTML = buildPayslipDocHtml(
    p.r.FirstName + ' ' + p.r.LastName, periodLabel, p.income, p.deduction, p.sideline, p.r.NettPay
  );
  document.getElementById('ps-overlay').classList.remove('hidden');
}

function showEmployeePayslipDoc(i) {
  const p = window._psRows[i];
  document.getElementById('ps-doc-body').innerHTML = buildPayslipDocHtml(
    window._psEmpName, fmtDate(p.r.PeriodEndDate), p.income, p.deduction, p.sideline, p.r.NettPay
  );
  document.getElementById('ps-overlay').classList.remove('hidden');
}

function closePayslip() {
  document.getElementById('ps-overlay').classList.add('hidden');
}

/* ═══════════════════════ MONTHLY REPORT TAB ═══════════════════════ */
async function initMonthlyTab() {
  const sel = document.getElementById('mr-select');
  const content = document.getElementById('mr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Loading pay periods…</div>';
  try {
    const runs = await fetchPayRuns();
    populatePayRunSelect(sel, runs);
    content.innerHTML = '<div class="panel panel-info">Pick a pay period above, then click <b>Run report</b>.</div>';
    if (runs.length) loadMonthlyReport();
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load pay periods</div>' + escapeHtml(err.message) + '</div>';
  }
}

async function loadMonthlyReport() {
  const sel = document.getElementById('mr-select');
  const id = sel.value;
  if (!id) return;
  const content = document.getElementById('mr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Building report…</div>';
  try {
    const res = await fetch(MONTHLY_REPORT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ payment_run_id: Number(id) }) });
    if (!res.ok) throw new Error('Status ' + res.status);
    const rows = await res.json();
    renderMonthlyReport(rows || [], sel.selectedOptions[0].textContent);
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t build report</div>' + escapeHtml(err.message) + '</div>';
  }
}

function renderMonthlyReport(rows, periodLabel) {
  const content = document.getElementById('mr-content');
  if (!rows.length) {
    content.innerHTML = '<div class="panel panel-info">No data for this period.</div>';
    return;
  }
  let totalGross = 0, totalDed = 0, totalNett = 0;
  const parsed = rows.map(r => {
    const income = parseJsonField(r.IncomeJSON);
    const deduction = parseJsonField(r.DeductionJSON);
    const gross = lineFind(income, 'Total') || 0;
    const ded = lineFind(deduction, 'Total') || 0;
    totalGross += gross; totalDed += ded; totalNett += Number(r.NettPay) || 0;
    return { r, gross, ded };
  });

  const cards = [
    { label: 'Pay period', num: periodLabel.split(' · ')[0] },
    { label: 'Employees', num: rows.length },
    { label: 'Total gross', num: money(totalGross) },
    { label: 'Total deductions', num: money(totalDed) },
    { label: 'Total nett paid', num: money(totalNett) }
  ];
  let html = '<div class="cards">' + cards.map(c =>
    '<div class="card"><div class="card-label">' + c.label + '</div><div class="card-num">' + c.num + '</div></div>'
  ).join('') + '</div>';

  html += '<div class="tbl-wrap"><table><thead><tr><th>Employee</th><th>ID Number</th><th class="num">Gross</th><th class="num">Deductions</th><th class="num">Nett pay</th></tr></thead><tbody>';
  parsed.sort((a, b) => (a.r.LastName || '').localeCompare(b.r.LastName || '')).forEach(p => {
    html += '<tr><td class="emp-name">' + escapeHtml(p.r.FirstName) + ' ' + escapeHtml(p.r.LastName) + '</td>' +
      '<td>' + escapeHtml(p.r.IDNumber) + '</td>' +
      '<td class="num money">' + money2(p.gross) + '</td>' +
      '<td class="num money">' + money2(p.ded) + '</td>' +
      '<td class="num money">' + money2(p.r.NettPay) + '</td></tr>';
  });
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

/* ═══════════════════════ SARS REPORT TAB ═══════════════════════ */
async function initSarsTab() {
  const sel = document.getElementById('sr-select');
  const content = document.getElementById('sr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Loading pay periods…</div>';
  try {
    const runs = await fetchPayRuns();
    populatePayRunSelect(sel, runs);
    content.innerHTML = '<div class="panel panel-info">Pick a pay period above, then click <b>Get liability</b>.</div>';
    if (runs.length) loadSarsReport();
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t load pay periods</div>' + escapeHtml(err.message) + '</div>';
  }
}

async function loadSarsReport() {
  const sel = document.getElementById('sr-select');
  const dateStr = sel.selectedOptions[0] ? sel.selectedOptions[0].dataset.date : null;
  if (!dateStr) return;
  const content = document.getElementById('sr-content');
  content.innerHTML = '<div class="center"><span class="spinner spinner-dark"></span> Checking SARS submission…</div>';
  try {
    const res = await fetch(SARS_LIABILITY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ period_end_date: dateStr }) });
    if (!res.ok) throw new Error('Status ' + res.status);
    const data = await res.json();
    renderSarsReport(data, dateStr);
  } catch (err) {
    content.innerHTML = '<div class="panel panel-warn"><div class="panel-title">⚠ Couldn\'t check SARS liability</div>' + escapeHtml(err.message) + '</div>';
  }
}

function renderSarsReport(data, dateStr) {
  const content = document.getElementById('sr-content');
  if (data && data.available === false) {
    content.innerHTML = '<div class="panel panel-info"><div class="panel-title">EMP201 not yet finalised</div>' +
      escapeHtml(data.message || 'This period has not been finalised in SimplePay yet.') +
      '<br>Submit the EMP201 in SimplePay first, then check back here.</div>';
    return;
  }
  const emp = Array.isArray(data) ? data[0] : data;
  if (!emp) {
    content.innerHTML = '<div class="panel panel-warn">No EMP201 data returned for ' + fmtDate(dateStr) + '.</div>';
    return;
  }
  const cards = [
    { label: 'PAYE', num: money2(emp.paye) },
    { label: 'UIF', num: money2(emp.uif) },
    { label: 'SDL', num: money2(emp.sdl) },
    { label: 'ETI', num: money2(emp.eti) },
    { label: 'Total liability', num: money2(emp.total) }
  ];
  let html = '<div class="cards">' + cards.map(c =>
    '<div class="card"><div class="card-label">' + c.label + '</div><div class="card-num">' + c.num + '</div></div>'
  ).join('') + '</div>';
  html += '<div class="panel panel-info">' +
    'PAYE number: <b>' + escapeHtml(emp.client_paye_number || '—') + '</b> · ' +
    'UIF number: <b>' + escapeHtml(emp.client_uif_number || '—') + '</b> · ' +
    'EMP201 version: <b>' + escapeHtml(emp.emp201_version || '—') + '</b>' +
    (emp.not_eti_compliant ? '<br><span style="color:var(--red)">⚠ Not ETI compliant for this period.</span>' : '') +
    '</div>';
  content.innerHTML = html;
}

/* ── Init ── */
initPayRunsTab();
initPayslipsTab();
initMonthlyTab();
initSarsTab();
</script>
</body>
